<!-- @dsCard group="Brand" viewport="700x300" name="Wireframe cube mark" subtitle="world cube (room) + head cube (bus solidaire) — the two distinct objects" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--canvas-noir);font-family:var(--font-mono);height:100%;}
  .wrap{display:flex;align-items:center;justify-content:center;gap:52px;height:300px;}
  /* world cube */
  .stage{width:170px;height:170px;perspective:660px;}
  .world{width:120px;height:120px;position:relative;margin:25px auto;transform-style:preserve-3d;
    animation:spin 18s linear infinite;}
  @keyframes spin{from{transform:rotateX(-22deg) rotateY(0deg);}to{transform:rotateX(-22deg) rotateY(360deg);}}
  @media(prefers-reduced-motion:reduce){.world{animation:none;transform:rotateX(-22deg) rotateY(-32deg);}}
  .wf{position:absolute;width:120px;height:120px;border:1.5px solid var(--wire-dim);background:rgba(255,255,255,.01);}
  .wf.front{border-color:var(--wire);}
  /* head cube (smaller, dashed — the 6-point bus solidary with the head) */
  .hc-wrap{position:absolute;top:50%;left:50%;transform:translate3d(14px,-10px,8px);transform-style:preserve-3d;}
  .hc{width:42px;height:42px;position:relative;margin:-21px;transform-style:preserve-3d;}
  .hf{position:absolute;width:42px;height:42px;margin:-21px;border:1px dashed var(--blanc);background:rgba(255,255,255,.025);}
  .hf.hfront{border-color:var(--blanc);}
  .hf.hside{border-color:var(--wire);}
  /* speaker-point dots — ONLY on the head cube */
  .pt{position:absolute;top:50%;left:50%;width:5px;height:5px;margin:-2.5px;border-radius:50%;background:var(--wire);}
  .pt.main{background:var(--blanc);width:7px;height:7px;margin:-3.5px;box-shadow:0 0 0 3px rgba(255,255,255,.15);}
  /* head dot */
  .head{position:absolute;top:50%;left:50%;width:9px;height:9px;margin:-4.5px;border-radius:50%;
    background:#fff;box-shadow:0 0 0 4px rgba(255,255,255,.12),0 0 14px rgba(255,255,255,.25);z-index:5;}
  .legend{color:var(--on-ink-muted);font-size:11px;line-height:2;letter-spacing:.04em;}
  .legend b{color:var(--on-ink-primary);font-weight:600;}
  .e{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:var(--on-ink-faint);display:block;margin-bottom:8px;}
  .dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--wire);margin-right:7px;vertical-align:middle;}
  .dot.w{background:transparent;border:1.5px solid var(--wire);}
  .dot.h{border:1px dashed var(--blanc);background:rgba(255,255,255,.1);}
  .dot.head{background:#fff;box-shadow:0 0 0 2px rgba(255,255,255,.2);}
</style>
</head>
<body>
<div class="wrap">
  <div class="stage">
    <div class="world">
      <!-- world cube: 6 plain faces, no dots -->
      <div class="wf front"  style="transform:translateZ(60px)"></div>
      <div class="wf"        style="transform:rotateY(180deg) translateZ(60px)"></div>
      <div class="wf"        style="transform:rotateY(90deg) translateZ(60px)"></div>
      <div class="wf"        style="transform:rotateY(-90deg) translateZ(60px)"></div>
      <div class="wf"        style="transform:rotateX(90deg) translateZ(60px)"></div>
      <div class="wf"        style="transform:rotateX(-90deg) translateZ(60px)"></div>
      <!-- head cube: 6 dashed faces, each with a speaker-point dot -->
      <div class="hc-wrap">
        <div class="hc">
          <div class="hf hfront" style="transform:translateZ(21px)"><span class="pt main"></span></div>
          <div class="hf hside"  style="transform:rotateY(180deg) translateZ(21px)"><span class="pt"></span></div>
          <div class="hf hside"  style="transform:rotateY(90deg) translateZ(21px)"><span class="pt"></span></div>
          <div class="hf hside"  style="transform:rotateY(-90deg) translateZ(21px)"><span class="pt"></span></div>
          <div class="hf hside"  style="transform:rotateX(90deg) translateZ(21px)"><span class="pt"></span></div>
          <div class="hf hside"  style="transform:rotateX(-90deg) translateZ(21px)"><span class="pt"></span></div>
          <span class="head"></span>
        </div>
      </div>
    </div>
  </div>
  <div class="legend">
    <span class="e">Le modèle · §3.5</span>
    <div><span class="dot w"></span><b>Cube-monde</b> — la pièce (fixe)</div>
    <div><span class="dot h"></span><b>Cube-tête</b> — bus 6 canaux solidaire</div>
    <div><span class="dot head"></span><b>Tête de l'auditeur</b> — mobile</div>
    <div style="margin-top:8px;color:var(--on-ink-faint)">6 faces = 6 directions · avant · arrière</div>
    <div style="color:var(--on-ink-faint)">gauche · droite · haut · bas</div>
    <div style="margin-top:8px;color:var(--on-ink-faint)">seuls ces 6 canaux sont convolués en HRTF</div>
  </div>
</div>
</body>
</html>
