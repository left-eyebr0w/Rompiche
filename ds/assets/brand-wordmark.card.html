<!-- @dsCard group="Brand" viewport="700x280" name="Wordmark & lockups" subtitle="IBM Plex Sans · cube glyph + mono sub-label" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--font-sans);}
  .wrap{display:grid;grid-template-columns:1fr 1fr;gap:0;height:280px;}
  .cell{display:flex;flex-direction:column;justify-content:center;gap:6px;padding:26px 30px;}
  .light{background:var(--bg);}
  .dark{background:var(--canvas-noir);}
  .lockup{display:flex;align-items:center;gap:14px;}
  /* static iso cube glyph */
  .glyph{width:30px;height:30px;perspective:200px;flex:0 0 30px;}
  .gcube{width:20px;height:20px;position:relative;margin:5px;transform-style:preserve-3d;transform:rotateX(-24deg) rotateY(-32deg);}
  .gface{position:absolute;width:20px;height:20px;border:1.5px solid var(--ink, #111);}
  .gf1{transform:translateZ(10px);}
  .gf2{transform:rotateY(90deg) translateZ(10px);}
  .gf3{transform:rotateX(90deg) translateZ(10px);}
  .name{font-size:24px;font-weight:600;letter-spacing:-0.01em;line-height:1;}
  .sub{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.18em;margin-top:5px;}
  .light .name{color:var(--text-primary);} .light .sub{color:var(--text-muted);} .light .gface{border-color:var(--noir);}
  .dark .name{color:var(--on-ink-primary);} .dark .sub{color:var(--on-ink-faint);} .dark .gface{border-color:var(--wire);}
  .stacked{align-items:flex-start;}
  .stacked .txt{display:flex;flex-direction:column;}
  .tag{font-family:var(--font-mono);font-size:9px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.14em;margin-bottom:18px;}
  .dark .tag{color:var(--on-ink-faint);}
</style>
</head>
<body>
<div class="wrap">
  <div class="cell light">
    <div class="tag">Primary · on paper</div>
    <div class="lockup">
      <span class="glyph"><span class="gcube"><span class="gface gf1"></span><span class="gface gf2"></span><span class="gface gf3"></span></span></span>
      <span class="name">Diorama sonore</span>
    </div>
    <div class="lockup stacked" style="margin-top:22px;">
      <span class="glyph"><span class="gcube"><span class="gface gf1"></span><span class="gface gf2"></span><span class="gface gf3"></span></span></span>
      <span class="txt"><span class="name" style="font-size:18px;">Diorama sonore</span><span class="sub">Documentation</span></span>
    </div>
  </div>
  <div class="cell dark">
    <div class="tag">Inverse · on viewport</div>
    <div class="lockup">
      <span class="glyph"><span class="gcube"><span class="gface gf1"></span><span class="gface gf2"></span><span class="gface gf3"></span></span></span>
      <span class="name">Diorama sonore</span>
    </div>
    <div class="lockup stacked" style="margin-top:22px;">
      <span class="glyph"><span class="gcube"><span class="gface gf1"></span><span class="gface gf2"></span><span class="gface gf3"></span></span></span>
      <span class="txt"><span class="name" style="font-size:18px;">Diorama sonore</span><span class="sub">v0 · prototype</span></span>
    </div>
  </div>
</div>
</body>
</html>
