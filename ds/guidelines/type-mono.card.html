<!-- @dsCard group="Type" viewport="700x210" name="Mono — the technical voice" subtitle="IBM Plex Mono · eyebrows, labels, readouts" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--bg);}
  .wrap{padding:24px 28px;font-family:var(--font-mono);color:var(--text-primary);}
  .eyebrow{font-size:var(--text-2xs);letter-spacing:var(--tracking-eyebrow);text-transform:uppercase;color:var(--text-muted);}
  .row{display:flex;gap:30px;align-items:flex-start;margin-top:14px;flex-wrap:wrap;}
  .block .k{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
  .readout{font-size:15px;font-variant-numeric:tabular-nums;color:var(--text-primary);line-height:1.7;}
  .readout .dim{color:var(--text-muted);}
  .label{font-size:13px;letter-spacing:.04em;color:var(--text-secondary);}
</style>
</head>
<body>
<div class="wrap">
  <span class="eyebrow">Branche Cadrage · §3</span>
  <div class="row">
    <div class="block">
      <div class="k">Parameter readout</div>
      <div class="readout">densité&nbsp;&nbsp;<span class="dim">0.42</span></div>
      <div class="readout">gain&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="dim">-6.0 dB</span></div>
      <div class="readout">tête&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;<span class="dim">x 0.18 · y 0.00 · z -0.31</span></div>
    </div>
    <div class="block">
      <div class="k">Labels &amp; state</div>
      <div class="label">PLUIE · ON</div>
      <div class="label">MÉTAL · ON</div>
      <div class="label">TERRE · OFF</div>
      <div class="label">CLOCK · CRÉPUSCULE</div>
    </div>
  </div>
</div>
</body>
</html>
