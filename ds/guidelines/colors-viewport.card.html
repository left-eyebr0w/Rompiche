<!-- @dsCard group="Colors" viewport="700x190" name="Viewport / wireframe" subtitle="the dark context — white strokes on near-black" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--font-mono);}
  .wrap{padding:22px 26px;}
  .lbl{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.14em;margin:0 0 12px;}
  .panel{background:var(--canvas-noir);border-radius:var(--radius-md);padding:20px 22px;display:flex;align-items:center;gap:26px;}
  .lines{display:flex;flex-direction:column;gap:9px;flex:1;}
  .line{height:0;border-top:1.5px solid;display:flex;align-items:center;}
  .line span{transform:translateY(-50%);background:var(--canvas-noir);padding-right:10px;font-size:10px;letter-spacing:.06em;}
  .l-wire{border-color:var(--wire);} .l-wire span{color:var(--on-ink-primary);}
  .l-dim{border-color:var(--wire-dim);} .l-dim span{color:var(--on-ink-muted);}
  .l-faint{border-color:var(--wire-faint);} .l-faint span{color:var(--on-ink-faint);}
  .chips{display:flex;gap:8px;}
  .chip{width:50px;height:50px;border-radius:4px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-size:8px;color:var(--on-ink-muted);}
</style>
</head>
<body>
<div class="wrap">
  <p class="lbl">Viewport context · canvas-noir #0d0d0d</p>
  <div class="panel">
    <div class="lines">
      <div class="line l-wire"><span>--wire · #ffffff</span></div>
      <div class="line l-dim"><span>--wire-dim · #6e6e6e</span></div>
      <div class="line l-faint"><span>--wire-faint · #3a3a3a</span></div>
    </div>
    <div class="chips">
      <div class="chip" style="background:var(--canvas-noir);border:1px solid var(--wire-faint);">noir</div>
      <div class="chip" style="background:var(--gris-900);">900</div>
    </div>
  </div>
</div>
</body>
</html>
