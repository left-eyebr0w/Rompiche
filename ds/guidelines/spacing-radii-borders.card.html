<!-- @dsCard group="Spacing" viewport="700x180" name="Radii & borders" subtitle="tight corners · hairline + 2px + dashed" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--font-mono);}
  .wrap{padding:24px 28px;display:flex;gap:40px;}
  .col{flex:1;}
  .lbl{font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.14em;margin:0 0 14px;}
  .row{display:flex;gap:16px;align-items:flex-end;}
  .box{width:56px;height:46px;background:var(--surface);border:1px solid var(--border-strong);display:flex;align-items:flex-end;justify-content:center;}
  .cap{font-size:9px;color:var(--text-muted);margin-top:6px;text-align:center;}
  .bd{width:56px;height:46px;background:var(--surface);}
</style>
</head>
<body>
<div class="wrap">
  <div class="col">
    <p class="lbl">Radii</p>
    <div class="row">
      <div><div class="box" style="border-radius:3px"></div><div class="cap">xs · 3</div></div>
      <div><div class="box" style="border-radius:4px"></div><div class="cap">sm · 4</div></div>
      <div><div class="box" style="border-radius:6px"></div><div class="cap">md · 6</div></div>
      <div><div class="box" style="border-radius:8px"></div><div class="cap">lg · 8</div></div>
      <div><div class="box" style="border-radius:999px;width:46px"></div><div class="cap">pill</div></div>
    </div>
  </div>
  <div class="col">
    <p class="lbl">Borders</p>
    <div class="row">
      <div><div class="bd" style="border:1px solid var(--border)"></div><div class="cap">hair · gris-200</div></div>
      <div><div class="bd" style="border:1px solid var(--border-strong)"></div><div class="cap">hair · ink</div></div>
      <div><div class="bd" style="border:2px solid var(--border-strong)"></div><div class="cap">bold · 2px</div></div>
      <div><div class="bd" style="border:1px dashed var(--border-muted)"></div><div class="cap">dashed · tbd</div></div>
    </div>
  </div>
</div>
</body>
</html>
