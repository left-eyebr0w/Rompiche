<!-- @dsCard group="Colors" viewport="700x180" name="Semantic roles" subtitle="text + surface + border aliases — author against these" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--font-sans);}
  .wrap{padding:22px 26px;display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.14em;margin:0 0 10px;}
  .demo{border:1px solid var(--border);border-radius:var(--radius-md);background:var(--surface);padding:14px 16px;}
  .demo .t1{color:var(--text-primary);font-size:15px;font-weight:600;}
  .demo .t2{color:var(--text-secondary);font-size:13px;}
  .demo .t3{color:var(--text-muted);font-size:13px;}
  .demo .t4{color:var(--text-faint);font-size:13px;}
  .stack > *{margin:2px 0;}
  .surfaces{display:flex;gap:8px;}
  .surfaces div{flex:1;height:46px;border-radius:var(--radius-sm);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;}
  .s-canvas{background:var(--surface-canvas);color:var(--text-muted);}
  .s-surface{background:var(--surface);color:var(--text-muted);}
  .s-sunken{background:var(--surface-sunken);color:var(--text-muted);}
  .s-ink{background:var(--surface-ink);color:var(--text-inverse);}
</style>
</head>
<body>
<div class="wrap">
  <div>
    <p class="lbl">Text on paper</p>
    <div class="demo stack">
      <div class="t1">text-primary · ink</div>
      <div class="t2">text-secondary</div>
      <div class="t3">text-muted · captions</div>
      <div class="t4">text-faint · hairline labels</div>
    </div>
  </div>
  <div>
    <p class="lbl">Surfaces</p>
    <div class="demo" style="padding:12px 14px;">
      <div class="surfaces">
        <div class="s-canvas">canvas</div>
        <div class="s-surface">surface</div>
        <div class="s-sunken">sunken</div>
        <div class="s-ink">ink</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
