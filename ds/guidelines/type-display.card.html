<!-- @dsCard group="Type" viewport="700x230" name="Display & headings" subtitle="IBM Plex Sans · tight tracking at scale" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  html,body{margin:0;background:var(--bg);}
  .wrap{padding:24px 28px;font-family:var(--font-sans);color:var(--text-primary);}
  .row{display:flex;align-items:baseline;gap:16px;margin:0 0 6px;}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--text-faint);letter-spacing:.08em;white-space:nowrap;width:118px;flex:0 0 118px;}
  .hero{font-size:var(--text-3xl);font-weight:600;letter-spacing:var(--tracking-tight);line-height:1.1;}
  .h1{font-size:var(--text-2xl);font-weight:600;letter-spacing:var(--tracking-tight);}
  .h2{font-size:var(--text-xl);font-weight:600;}
  .h3{font-size:var(--text-lg);font-weight:600;}
</style>
</head>
<body>
<div class="wrap">
  <div class="row"><span class="tag">3xl / 40 / 600</span><span class="hero">Diorama sonore</span></div>
  <div class="row"><span class="tag">2xl / 32 / 600</span><span class="h1">Le modèle du moteur</span></div>
  <div class="row"><span class="tag">xl / 22 / 600</span><span class="h2">Spatialisation binaurale</span></div>
  <div class="row"><span class="tag">lg / 18 / 600</span><span class="h3">Bus de 6 points solidaire de la tête</span></div>
</div>
</body>
</html>
