<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{margin:0;background:var(--bg);font-family:var(--font-sans);color:var(--text-primary);}
  .wrap{padding:26px 30px 30px;}
  .row{display:flex;flex-wrap:wrap;align-items:center;gap:14px;margin-bottom:8px;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
  .group{margin-bottom:26px;}
  .group:last-child{margin-bottom:0;}
  .gl{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;
      color:var(--text-faint);margin:0 0 12px;border-bottom:1px solid var(--border);padding-bottom:6px;}
  .panel{background:var(--canvas-noir);border-radius:8px;padding:18px 20px;}
</style>
</head>
<body>
<div id="root" class="wrap"></div>
<script type="text/babel">
const { Button, Tag, Eyebrow, Callout, Card, Switch, Slider } = window.DioramaSonoreDesignSystem_6d9bc4;

function Demo(){
  const [x, setX] = React.useState(0.4);
  return (
    <>
      <div className="group">
        <p className="gl">Button — variants · sizes · mono</p>
        <div className="row">
          <Button variant="primary">Lancer l'écoute</Button>
          <Button variant="secondary">Déplacer</Button>
          <Button variant="ghost">Réinitialiser</Button>
          <Button variant="primary" disabled>Indisponible</Button>
        </div>
        <div className="row">
          <Button variant="secondary" size="sm">Petit</Button>
          <Button variant="secondary" size="md">Moyen</Button>
          <Button variant="secondary" size="lg">Grand</Button>
          <Button variant="ghost" mono>v0.5 · spéc</Button>
        </div>
        <div className="panel row" style={{marginTop:10}}>
          <Button variant="inverse">Sur viewport</Button>
          <Button variant="inverse-ghost">Bus 6 canaux</Button>
        </div>
      </div>

      <div className="group">
        <p className="gl">Tag &amp; Eyebrow</p>
        <div className="row">
          <Tag variant="spec">spécifiée</Tag>
          <Tag variant="tbd">TBD</Tag>
          <Tag variant="solid" dot>v0.5</Tag>
          <Tag>résolu v0.4</Tag>
        </div>
        <div className="row" style={{marginTop:8}}>
          <Eyebrow>Branche Cadrage</Eyebrow>
          <Eyebrow tone="ink">§3 · Le moteur</Eyebrow>
        </div>
      </div>

      <div className="group">
        <p className="gl">Callout</p>
        <Callout title="Bénéfice clé.">Le coût de spatialisation est fixe — 6 convolutions, indépendant du nombre de grains.</Callout>
        <Callout variant="muted">Seule la v0 est spécifiée finement ; v1 et v2 restent indicatives.</Callout>
      </div>

      <div className="group">
        <p className="gl">Card</p>
        <div className="grid">
          <Card as="a" href="#" title="Cadrage →" meta={<Tag variant="spec">spécifiée</Tag>}>
            Vision, principes, modèle du moteur, architecture &amp; coûts.
          </Card>
          <Card disabled title="À venir">D'autres branches viendront enrichir cette documentation.</Card>
        </div>
      </div>

      <div className="group">
        <p className="gl">Switch &amp; Slider — engine controls</p>
        <div className="grid">
          <div className="row" style={{flexDirection:'column',alignItems:'flex-start',gap:12}}>
            <Switch label="Pluie" showState defaultChecked />
            <Switch label="Surface métal" showState defaultChecked />
            <Switch label="Surface terre" showState />
          </div>
          <Slider label="Densité de grains" min={0} max={1} step={0.01}
            value={x} formatValue={v=>v.toFixed(2)}
            onChange={e=>setX(parseFloat(e.target.value))} />
        </div>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
